services:

  # ── Database ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-weightquest}
      POSTGRES_USER:     ${POSTGRES_USER:-wq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wqpass}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wq} -d ${POSTGRES_DB:-weightquest}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Backend API ───────────────────────────────────────
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-wq}:${POSTGRES_PASSWORD:-wqpass}@postgres:5432/${POSTGRES_DB:-weightquest}
      JWT_SECRET:   ${JWT_SECRET:-change-me-in-production}
      ADMIN_EMAIL:  ${ADMIN_EMAIL:-}
      PORT:         5000
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend (game) ───────────────────────────────────
  frontend:
    build: ./frontend

  # ── Admin panel ───────────────────────────────────────
  admin:
    build: ./admin

  # ── Nginx gateway ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - admin
      - backend

volumes:
  pgdata:
